<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WBS Explorer | Lunar Gateway</title>
  <meta
    name="description"
    content="A work breakdown structure explorer for Lunar Gateway."
  />
  <meta name="theme-color" content="#0b1624" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Lunar Gateway Application Ecosystem" />
  <meta property="og:title" content="WBS Explorer | Lunar Gateway" />
  <meta
    property="og:description"
    content="A work breakdown structure explorer for Lunar Gateway."
  />
  <meta property="og:url" content="./" />
  <meta property="og:image" content="../suite-assets/lunar-gateway-share-card.svg" />
  <meta property="og:image:alt" content="Lunar Gateway WBS Explorer" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="WBS Explorer | Lunar Gateway" />
  <meta
    name="twitter:description"
    content="A work breakdown structure explorer for Lunar Gateway."
  />
  <meta name="twitter:image" content="../suite-assets/lunar-gateway-share-card.svg" />
  <link rel="icon" type="image/svg+xml" href="../suite-assets/lunar-gateway-favicon.svg" />
  <link rel="stylesheet" href="../suite-assets/suite-context.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="suite-nav" aria-label="Gateway suite navigation">
      <a class="suite-nav__home" href="../" data-suite-route="simulation">Simulation</a>
      <div class="suite-nav__links">
        <a class="suite-nav__link" href="../documents/" data-suite-route="documents">Documents</a>
        <a class="suite-nav__link suite-nav__link--active" href="./" data-suite-route="wbs" aria-current="page">WBS</a>
        <a class="suite-nav__link" href="../schedule/" data-suite-route="schedule">Schedule</a>
        <a class="suite-nav__link" href="../cost/" data-suite-route="cost">Cost</a>
        <a class="suite-nav__link" href="../risk/" data-suite-route="risk">Risk</a>
      </div>
    </nav>

    <header class="intro">
      <button class="home-button" type="button" data-action="home">Home</button>
      <div class="intro__copy">
        <p class="eyebrow">Gateway Program Map</p>
        <h1 id="appTitle">Work Breakdown Structure</h1>
        <p id="appSubtitle" class="intro__subtitle">
          How Gateway is organized, from detailed work up to the full program.
        </p>
      </div>

      <div class="intro__guide">
        <p class="guide__label">At a glance</p>

        <div id="appSignals" class="intro__signals" aria-label="Program signals"></div>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <aside class="nav-zone" aria-label="WBS navigation">
        <div class="nav-zone__header">
          <h2>Program structure</h2>
          <p id="treeStatus" class="nav-zone__hint">Loading hierarchy...</p>
        </div>

        <div class="view-switch" role="tablist" aria-label="Navigation view mode">
          <button
            id="explorerViewBtn"
            class="view-switch__button view-switch__button--active"
            type="button"
            data-view-mode="explorer"
            aria-selected="true"
          >
            Explorer View
          </button>
          <button
            id="structureViewBtn"
            class="view-switch__button"
            type="button"
            data-view-mode="structure"
            aria-selected="false"
          >
            Structure View
          </button>
        </div>

        <label class="search-field" for="searchInput">
          <span class="search-field__label">Search</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Branch name, ID, or keyword"
            autocomplete="off"
          />
        </label>

        <div class="nav-zone__actions">
          <button id="expandTopBtn" class="toolbar-button" type="button">Expand all</button>
          <button id="collapseBtn" class="toolbar-button" type="button">Collapse all</button>
        </div>

        <nav id="tree" class="tree" aria-label="Work breakdown structure"></nav>

        <section id="structureView" class="structure-view" aria-label="WBS structure visualization" hidden>
          <div class="structure-view__summary">
            <p class="structure-view__intro">
              Detailed work on the left rolls up to the program on the right.
            </p>
            <div id="structureLevelSummary" class="structure-levels" aria-label="Hierarchy level summary"></div>
          </div>

          <div id="structureViewport" class="structure-viewport">
            <svg id="structureSvg" class="structure-svg" role="img" aria-label="Gateway WBS structure view"></svg>
          </div>

          <section id="structureSelectedSummary" class="structure-selected" aria-live="polite"></section>
        </section>
      </aside>

      <section class="overview-zone" aria-label="Selected node overview">
        <div id="overviewContent" class="overview-content">
          <section class="loading-state">
            <h2>Loading…</h2>
          </section>
        </div>
      </section>

      <aside id="focusZone" class="focus-zone" aria-label="Focused detail" aria-live="polite" hidden>
        <div id="focusContent" class="focus-content"></div>
      </aside>
    </main>
  </div>

  <script>
    (function () {
      const suitePorts = { documents: 4473, wbs: 4173, schedule: 4373, cost: 4273, risk: 4573 };
      const suiteHost = window.location.hostname || '127.0.0.1';
      const standalonePorts = new Set(Object.values(suitePorts).map(String));
      const runningStandalone = standalonePorts.has(String(window.location.port || ''));
      if (!runningStandalone) return;
      document.querySelectorAll('[data-suite-route]').forEach((link) => {
        const route = link.getAttribute('data-suite-route');
        if (route === 'simulation') {
          link.href = '/index.html';
          return;
        }
        if (!suitePorts[route]) return;
        link.href = `http://${suiteHost}:${suitePorts[route]}/${route}/`;
      });
    })();
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
